name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
      - DES-*
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download Dependencies
        run: go mod download

      - name: Verify Build
        run: go build ./...

      - name: Run Tests
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8080"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build NextJS
        run: npm run build
